<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- This mask cuts the perfect lines into the solid black shell -->
    <mask id="shell-cuts">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <g stroke="black" stroke-width="3" fill="none">
        <!-- Inner hexagon outline -->
        <polygon points="59,34.4 68,50 59,65.6 41,65.6 32,50 41,34.4" />
        <!-- Radiating lines to the corners -->
        <line x1="59" y1="34.4" x2="66" y2="22.3" />
        <line x1="68" y1="50" x2="82" y2="50" />
        <line x1="59" y1="65.6" x2="66" y2="77.7" />
        <line x1="41" y1="65.6" x2="34" y2="77.7" />
        <line x1="32" y1="50" x2="18" y2="50" />
        <line x1="41" y1="34.4" x2="34" y2="22.3" />
      </g>
    </mask>
  </defs>

  <!-- Light Gray Background Circle -->
  <circle cx="50" cy="50" r="46" fill="#DCDCDC" />

  <g fill="#000000">
    <!-- 4 Flippers (Rotated perfectly to match the angled shell edges) -->
    <!-- Top Right -->
    <rect x="76" y="44" width="10" height="12" transform="rotate(-30 50 50)" />
    <!-- Top Left -->
    <rect x="76" y="44" width="10" height="12" transform="rotate(-150 50 50)" />
    <!-- Bottom Right -->
    <rect x="76" y="44" width="10" height="12" transform="rotate(30 50 50)" />
    <!-- Bottom Left -->
    <rect x="76" y="44" width="10" height="12" transform="rotate(150 50 50)" />

    <!-- Tail -->
    <polygon points="44,77 56,77 50,91" />

    <!-- Blocky Head -->
    <path d="M 43,23 L 43,12 L 46,7 L 54,7 L 57,12 L 57,23 Z" />

    <!-- The Shell -->
    <polygon points="66,22.3 82,50 66,77.7 34,77.7 18,50 34,22.3" mask="url(#shell-cuts)" />
  </g>

  <!-- White Eyes -->
  <rect x="46.5" y="11" width="2" height="2" fill="white" />
  <rect x="51.5" y="11" width="2" height="2" fill="white" />
</svg>
