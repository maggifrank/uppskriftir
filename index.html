<!DOCTYPE html>
<html lang="is">
  <head>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-F9KQ57R3FP"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-F9KQ57R3FP");
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Uppskriftir</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <a href="index.html"><div class="logo">🍲</div></a>
        <div>
          <h1>Uppskriftir</h1>
          <p class="sub">
            Saman safn af uppskriftum. Sumar frá mér aðrar frá öðrum.
          </p>
        </div>
      </div>
      <div class="top-actions">
        <input
          id="search"
          class="search"
          type="search"
          placeholder="Leita eftir uppskriftum (t.d. kjúklingur, vegan, brunch)"
        />
        <select id="category" class="select">
          <option value="all">Allir flokkar</option>
        </select>
        <button id="random" class="btn secondary" title="Kasta teningnum">
          Random
        </button>
        <div class="menu-wrap">
          <button class="btn secondary menu-btn" id="menuBtn" aria-label="Valmynd">☰</button>
          <div class="menu-dropdown" id="menuDropdown" hidden>
            <a href="admin.html">Admin</a>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <!-- LIST VIEW -->
      <section id="listView" class="card">
        <div class="list-header">
          <h2 id="listTitle">Uppskriftir</h2>
          <div class="muted" id="resultCount"></div>
        </div>
        <div id="chips" class="chips"></div>
        <div id="grid" class="grid" aria-live="polite"></div>
        <div id="empty" class="empty" hidden>
          <div class="empty-title">Engar uppskriftir fundust.</div>
          <div class="muted">Reyndu önnur leitarskilyrði</div>
          <button id="clearFilters" class="btn">Hreinsa síur</button>
        </div>
      </section>

      <!-- RECIPE VIEW -->
      <section id="recipeView" class="card" hidden>
        <div class="recipe-top">
          <button id="back" class="btn secondary">← Til baka</button>
          <div class="spacer"></div>
          <button id="copyLink" class="btn secondary">Afrita hlekk</button>
          <button id="print" class="btn">Prenta</button>
        </div>
        <article class="recipe" id="recipeArticle"></article>
      </section>
    </main>

    <footer class="footer">
      <a href="index.html"
        ><img src="/img/franklin-logo-black.png" alt="Franklin logo"
      /></a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="scripts/env.js"></script>
    <script src="scripts/supabase-config.js"></script>
    <script src="scripts/app.js"></script>

  </body>
</html>
