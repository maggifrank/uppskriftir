<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Cookbook</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <div class="logo">🍲</div>
      <div>
        <h1>Uppskriftir</h1>
        <p class="sub">Saman safn af uppskriftum. Sumar frá mér aðrar frá öðrum.</p>
      </div>
    </div>

    <div class="top-actions">
      <input id="search" class="search" type="search" placeholder="Search recipes… (e.g. chicken, vegan, 30 min)" />
      <select id="category" class="select">
        <option value="all">Allir flokkar</option>
      </select>
      <button id="random" class="btn secondary" title="Surprise me">Random</button>
    </div>
  </header>

  <main class="main">
    <!-- LIST VIEW -->
    <section id="listView" class="card">
      <div class="list-header">
        <h2 id="listTitle">Uppskriftir</h2>
        <div class="muted" id="resultCount"></div>
      </div>

      <div id="chips" class="chips"></div>

      <div id="grid" class="grid" aria-live="polite"></div>
      <div id="empty" class="empty" hidden>
        <div class="empty-title">Engar uppskriftir fundust.</div>
        <div class="muted">Reyndu önnur leitarskilyrði</div>
        <button id="clearFilters" class="btn">Hreinsa síur</button>
      </div>
    </section>

    <!-- RECIPE VIEW -->
    <section id="recipeView" class="card" hidden>
      <div class="recipe-top">
        <button id="back" class="btn secondary">← Til baka</button>
        <div class="spacer"></div>
        <button id="copyLink" class="btn secondary">afrita hlekk</button>
        <button id="print" class="btn">Prenta</button>
      </div>

      <article class="recipe" id="recipeArticle"></article>
    </section>
  </main>

  <footer class="footer">
    
  </footer>

  <script src="app.js"></script>
</body>
</html>
